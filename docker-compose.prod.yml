services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./.env.production
    volumes:
      - pg_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ./.env.production
      - ./Backend/.env.production
    environment:
      DJANGO_ENV: prod
      DB_HOST: postgres
      DB_PORT: 5432
      CACHE_REDIS_URL: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/2
      CHANNEL_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend_prod_media:/app/media
      - backend_prod_static:/app/staticfiles
    command: >
      sh -c "python manage.py migrate --settings=core.settings.prod &&
             python manage.py validate_startup --settings=core.settings.prod &&
             daphne -b 0.0.0.0 -p 8000 core.asgi:application"

  worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ./.env.production
      - ./Backend/.env.production
    environment:
      DJANGO_ENV: prod
      DB_HOST: postgres
      DB_PORT: 5432
      CACHE_REDIS_URL: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/2
      CHANNEL_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A core worker -l info --concurrency=4

  scheduler:
    build:
      context: ./Backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ./.env.production
      - ./Backend/.env.production
    environment:
      DJANGO_ENV: prod
      DB_HOST: postgres
      DB_PORT: 5432
      CACHE_REDIS_URL: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/2
      CHANNEL_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A core beat -l info

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - ./.env.production
      - ./Frontend/.env.production
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pg_prod_data:
  redis_prod_data:
  backend_prod_media:
  backend_prod_static:
